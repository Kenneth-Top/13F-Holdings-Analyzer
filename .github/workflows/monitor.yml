name: 13F Filing Monitor

on:
  schedule:
    # 每天 UTC 0点和12点运行 (北京时间 8:00 和 20:00)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write    # 允许推送回仓库

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Filing Monitor
        run: |
          export PYTHONPATH="."
          python backend/filing_monitor.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/holdings.db data/monitor_state.json backend/sector_cache.db
          # 如果没有变化就跳过提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: New 13F filings detected & grabbed" && git push)
