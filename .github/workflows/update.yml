name: 自动更新 13F 数据

on:
  schedule:
    # 每天 UTC 6:00 运行 (北京时间 14:00)
    # 13F 截止日后的月份(2/5/8/11月)每天检查新数据
    - cron: '0 6 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行采集脚本
        run: python backend/scraper.py --quarters 2
        env:
          SEC_USER_AGENT: "13F-Tracker research@example.com"
          PYTHONPATH: "."

      - name: 检查是否有数据更新
        id: check_changes
        run: |
          git diff --stat
          if git diff --quiet data/holdings.db; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "📭 没有新数据"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📬 检测到数据更新!"
          fi

      - name: 提交并推送更新
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/holdings.db
          git commit -m "🔄 自动更新 13F 数据 $(date +'%Y-%m-%d')"
          git push
